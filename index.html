<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Café Aroma</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="stylecarrito.css">
</head>

<body>

<!-- ================= NAVBAR ================= -->
<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
    <div class="container">

        <a class="navbar-brand fw-bold" href="#">
             Café Aroma
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">

            <ul class="navbar-nav me-auto">

                <li class="nav-item">
                    <a class="nav-link" href="#productos">Menú</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#contacto">Contacto</a>
                </li>

                <!--  BOTÓN PEDIDOS  -->
                <li class="nav-item">
                    <a class="nav-link"
                       href="https://forms.office.com/r/qfNipDPdnD"
                       target="_blank">
                       Pedidos
                    </a>
                </li>

            </ul>

            <div class="d-flex">

                <!-- CARRITO -->
                <button class="btn btn-outline-light me-2"
                    data-bs-toggle="offcanvas"
                    data-bs-target="#offcanvasCarrito">

                    <i class="fas fa-shopping-cart"></i>
                    <span class="badge bg-danger" id="contador-carrito">0</span>
                </button>

                <!-- MENU -->
                <button class="btn btn-outline-light"
                    data-bs-toggle="offcanvas"
                    data-bs-target="#offcanvasMenu">

                    <i class="fas fa-bars"></i>
                </button>

            </div>

        </div>
    </div>
</nav>

<!-- ================= HERO ================= -->
<section class="hero">
    <div class="container text-center text-white">

        <h1 class="display-3 fw-bold">El mejor café de la ciudad </h1>

        <p class="lead">
            Disfruta cada sorbo con el mejor aroma
        </p>

        <a href="#productos" class="btn btn-success btn-lg mt-3">
            Ver Menú
        </a>

        <!-- BOTÓN GRANDE PEDIDOS -->
        <a href="https://forms.office.com/r/qfNipDPdnD"
           target="_blank"
           class="btn btn-light btn-lg mt-3">
            Pedidos
        </a>

    </div>
</section>

<!-- ================= PRODUCTOS ================= -->
<section class="container py-5" id="productos">

    <h1 class="text-center mb-5">Menú Café Aroma</h1>

    <div class="row">

        <!-- PRODUCTOS -->
        <div class="col-md-8">
            <div class="row g-4">

                <div class="col-md-4">
                    <div class="card h-100">
                        <img src="cafe.jpg" class="card-img-top">
                        <div class="card-body">
                            <h5 class="card-title">Café Americano</h5>
                            <button class="btn btn-success w-100"
                                onclick="agregarProducto('Café Americano')">
                                Agregar
                            </button>
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card h-100">
                        <img src="latte.jpg" class="card-img-top">
                        <div class="card-body">
                            <h5 class="card-title">Latte</h5>
                            <button class="btn btn-success w-100"
                                onclick="agregarProducto('Latte')">
                                Agregar
                            </button>
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card h-100">
                        <img src="capuccino.jpg" class="card-img-top">
                        <div class="card-body">
                            <h5 class="card-title">Capuccino</h5>
                            <button class="btn btn-success w-100"
                                onclick="agregarProducto('Capuccino')">
                                Agregar
                            </button>
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <!-- CARRITO -->
        <div class="col-md-4">
            <div class="card shadow" id="carritocard">

                <div class="card-header">
                    Carrito
                </div>

                <ul class="list-group list-group-flush" id="lista-carrito">
                    <li class="list-group-item text-muted text-center">
                        No hay productos
                    </li>
                </ul>

                <div class="card-footer text-center">
                    <button class="btn btn-danger"
                        onclick="eliminarProducto()">
                        Eliminar último
                    </button>
                </div>

            </div>
        </div>

    </div>

</section>

<!-- ================= FOOTER ================= -->
<footer id="contacto" class="text-white text-center py-4">
    <div class="container">

        <h4>Café Aroma</h4>
        <p>Tu lugar favorito para relajarte </p>

        <p>
            <i class="fas fa-phone"></i>
            +52 55 1234 5678
        </p>

        <p class="mt-3">
            &copy; 2026 Café Aroma
        </p>

    </div>
</footer>

<!-- ================= SCRIPTS ================= -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="carrito.js"></script>

</body>
</html>
