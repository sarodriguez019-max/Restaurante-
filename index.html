<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Café Aroma</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="CSS/style.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
<div class="container">

<a class="navbar-brand fw-bold">
Café Aroma
</a>

<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navbarNav">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="navbarNav">

<ul class="navbar-nav me-auto">
<li class="nav-item"><a class="nav-link" href="#productos">Menú</a></li>
<li class="nav-item"><a class="nav-link" href="#contacto">Contacto</a></li>

<li class="nav-item">
<a class="nav-link"
href="https://forms.office.com/r/qfNipDPdnD"
target="_blank">
Pedidos
</a>
</li>
</ul>

</div>
</div>
</nav>

<!-- HERO -->
<section class="hero">
<div class="container text-center text-white">

<h1 class="display-3 fw-bold">
Bienvenido a Café Aroma
</h1>

<p class="lead">
Disfruta el mejor café de la ciudad
</p>

<div class="d-flex justify-content-center gap-3 mt-4">

<a href="#productos" class="btn btn-success btn-lg">
Ver Menú
</a>

<a href="https://forms.office.com/r/qfNipDPdnD"
target="_blank"
class="btn btn-light btn-lg">
Pedidos
</a>

</div>

</div>
</section>

<!-- PRODUCTOS -->
<section class="container py-5" id="productos">

<h1 class="text-center mb-5">
MENÚ CAFÉ AROMA
</h1>

<div class="row">

<!-- PRODUCTOS -->
<div class="col-md-8">
<div class="row g-4">

<div class="col-md-4">
<div class="card h-100">
<img src="IMG/cafe.jpg" class="card-img-top">
<div class="card-body">
<h5 class="card-title">Café Americano</h5>
<button class="btn btn-success w-100"
onclick="agregarProducto('Café Americano')">
Agregar
</button>
</div>
</div>
</div>

<div class="col-md-4">
<div class="card h-100">
<img src="IMG/latte.jpg" class="card-img-top">
<div class="card-body">
<h5 class="card-title">Latte</h5>
<button class="btn btn-success w-100"
onclick="agregarProducto('Latte')">
Agregar
</button>
</div>
</div>
</div>

<div class="col-md-4">
<div class="card h-100">
<img src="IMG/capuchino.jpg" class="card-img-top">
<div class="card-body">
<h5 class="card-title">Capuccino</h5>
<button class="btn btn-success w-100"
onclick="agregarProducto('Capuccino')">
Agregar
</button>
</div>
</div>
</div>

</div>
</div>

<!-- CARRITO -->
<div class="col-md-4">
<div class="card shadow" id="carritocard">

<div class="card-header">
Carrito
</div>

<ul class="list-group list-group-flush" id="lista-carrito">
<li class="list-group-item text-muted text-center">
No hay productos
</li>
</ul>

<div class="card-footer text-center">
<button class="btn btn-danger"
onclick="eliminarProducto()">
Eliminar último
</button>
</div>

</div>
</div>

</div>
</section>

<!-- FOOTER -->
<footer id="contacto" class="footer">

<div class="container">

<h4>Café Aroma</h4>

<p>Tu cafetería favorita</p>

<p>+52 442 123 4567</p>

<p class="mt-3">
&copy; 2026 Café Aroma
</p>

</div>
</footer>

<!-- Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- TU JS (CORREGIDO) -->
<script src="JS/script.js"></script>

</body>
</html>
