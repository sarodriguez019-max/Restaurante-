<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Café Aroma</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="stylecarrito.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
<div class="container">

<a class="navbar-brand fw-bold">☕ Café Aroma</a>

<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="nav">

<ul class="navbar-nav me-auto">
<li class="nav-item"><a class="nav-link" href="#productos">Menú</a></li>
<li class="nav-item"><a class="nav-link" href="#contacto">Contacto</a></li>
<li class="nav-item">
<a class="nav-link" href="https://forms.office.com/r/qfNipDPdnD" target="_blank">
Pedidos
</a>
</li>
</ul>

</div>
</div>
</nav>

<!-- HERO -->
<section class="hero">
<div class="container text-center text-white">

<h1 class="display-3 fw-bold">Café Aroma ☕</h1>
<p class="lead">Disfruta el mejor café</p>

<div class="d-flex justify-content-center gap-3 mt-4">
<a href="#productos" class="btn btn-success btn-lg">Ver Menú</a>

<a href="https://forms.office.com/r/qfNipDPdnD"
target="_blank"
class="btn btn-light btn-lg">
Pedidos
</a>
</div>

</div>
</section>

<!-- PRODUCTOS -->
<section class="container py-5" id="productos">

<h1 class="text-center mb-5">Menú Café Aroma</h1>

<div class="row">

<div class="col-md-8">
<div class="row g-4">

<!-- PRODUCTO -->
<div class="col-md-4">
<div class="card h-100">
<img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93" class="card-img-top">
<div class="card-body">
<h5>Café Americano</h5>
<button class="btn btn-success w-100">Agregar</button>
</div>
</div>
</div>

<div class="col-md-4">
<div class="card h-100">
<img src="https://images.unsplash.com/photo-1521305916504-4a1121188589" class="card-img-top">
<div class="card-body">
<h5>Latte</h5>
<button class="btn btn-success w-100">Agregar</button>
</div>
</div>
</div>

<div class="col-md-4">
<div class="card h-100">
<img src="https://images.unsplash.com/photo-1511920170033-f8396924c348" class="card-img-top">
<div class="card-body">
<h5>Capuccino</h5>
<button class="btn btn-success w-100">Agregar</button>
</div>
</div>
</div>

</div>
</div>

<!-- CARRITO -->
<div class="col-md-4">
<div class="card shadow" id="carritocard">

<div class="card-header">Carrito</div>

<ul class="list-group list-group-flush">
<li class="list-group-item text-muted text-center">
No hay productos
</li>
</ul>

<div class="card-footer text-center">
<button class="btn btn-danger">Eliminar último</button>
</div>

</div>
</div>

</div>
</section>

<!-- FOOTER -->
<footer id="contacto" class="text-white text-center py-4">
<div class="container">

<h4>Café Aroma</h4>
<p>Tu lugar favorito ☕</p>

<p>📞 +52 55 1234 5678</p>

</div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
